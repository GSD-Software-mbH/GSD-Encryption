trigger: none
pr: none

resources:
  repositories:
    - repository: flutter_pipelines
      type: git
      # Format: "<AzureDevOpsProject>/<RepositoryName>"
      name: Flutter Pipelines/Flutter Pipelines
  pipelines:
    - pipeline: buildUpstream
      project: Flutter Encryption
      source: Build
      trigger:
        branches:
          include:
            - master

stages:
  - template: templates/Packages/Sync/publish-pubdev-stage.yml@flutter_pipelines
    parameters:
      sourceBranch: master

