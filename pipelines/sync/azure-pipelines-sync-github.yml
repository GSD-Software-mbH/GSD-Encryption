trigger: none
pr: none

resources:
  repositories:
    - repository: flutter_pipelines
      type: git
      # Format: "<AzureDevOpsProject>/<RepositoryName>"
      name: Flutter Pipelines/Flutter Pipelines
  pipelines:
    - pipeline: buildUpstream
      project: Flutter Encryption
      source: Build
      trigger:
        branches:
          include:
            - master

variables:
  - group: github-sync-secrets

stages:
  - template: templates/Packages/Sync/sync-github-stage.yml@flutter_pipelines
    parameters:
      sourceBranch: master
      targetBranch: master
      githubRepo: GSD-Software-mbH/GSD-Encryption

